<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Wabash Systems</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://wabashsystems.com/">
<style>
  :root {
    --navy: #0d1a2a;
    --navy-mid: #1a2e44;
    --orange: #c4622d;
    --cream: #f8f6f1;
    --gray-mid: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--navy);
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    line-height: 1.6;
  }
  .wrap { max-width: 560px; text-align: center; }
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 1rem;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1.25rem;
  }
  p {
    color: var(--gray-mid);
    font-size: 1.05rem;
    margin-bottom: 2rem;
  }
  .btn {
    display: inline-block;
    background: var(--navy);
    color: var(--cream);
    padding: 0.85rem 2rem;
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--orange); }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.82rem;
    color: var(--gray-mid);
    margin-top: 3rem;
    letter-spacing: 0.1em;
  }
</style>

  <!-- ── Sentry frontend (errors + perf) ── -->
  <script src="/js/sentry-init.js"></script>
  <script src="https://js.sentry-cdn.com/8b2571b52de8397c9d84aac021fd805a.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="wrap">
    <div class="tag">Error 404</div>
    <h1>This page doesn't exist.</h1>
    <p>The link may be old, the URL may be mistyped, or the page has moved. Head back to the homepage to find your way.</p>
    <a href="/" class="btn">Back to Wabash Systems</a>
    <div class="code">HTTP 404 · Not Found</div>
  </div>
</body>
</html>
